wrds:
  hard_scope:
    tickers: exact_distinct_tickers_in_immutable_5000_article_dataset
    announcements_start: 2022-01-01
    announcements_end_exclusive: 2026-01-01
    quarterly_eps_usd_only: true
    max_resulting_event_rows: 2500
  sources:
    actuals: ibes.actu_epsus
    consensus: ibes.statsumu_epsus
    link: wrdsapps_link_crsp_ibes.ibcrsphist
    split_factors: crsp.dsf_v2
  link_rule: active_on_announcement_date_score_at_most_1
  consensus_rule: latest_statpers_strictly_before_anndats
  raw_time_rule: preserve_raw_ibes_dates_and_times_without_assigning_utc
  news_match_rule: first_cached_article_same_ticker_with_new_york_date_strictly_after_max_anndats_actdats_and_no_more_than_two_calendar_days_later
  split_basis_rule: actual_unadjusted_times_dlycumfacshr_at_statpers_divided_by_dlycumfacshr_at_report_date
  derived_fields:
    - actual_on_consensus_basis
    - eps_surprise
    - dispersion
    - contributor_count
    - revisions_up
    - revisions_down
    - missingness_indicators

modeling:
  seed: 20260721
  estimator: ridge
  ridge_alpha: 1.0
  transforms: development_only_standardization_imputation
  nested_models:
    price_only:
      - lagged_return_5d
      - lagged_return_21d
      - volume_zscore_20d
    expectations_fundamentals_only:
      - eps_surprise
      - standardized_eps_surprise
      - dispersion
      - contributor_count
      - revisions_up
      - revisions_down
      - missingness_indicators
    sector_calendar_only:
      - sector
      - entry_month
      - entry_day_of_week
    cached_text_only:
      - cached_event_surprise_signal
      - cached_llm_direction_score
      - cached_finbert_score
      - cached_materiality
      - cached_novelty
      - cached_abstain
    combined:
      - price_only
      - expectations_fundamentals_only
      - sector_calendar_only
      - cached_text_only

target:
  primary: five_session_return_residualized_by_equal_weight_125_name_universe_return_same_entry_date
  raw_return_column_source: immutable_articles_future_return_5d
  universe_return_source: immutable_prices

